# Baut die Astro-Site statisch und veröffentlicht sie auf GitHub Pages.
# Läuft bei jedem Push auf main — live unter https://muckiseftle.github.io/multitrex/
#
# Einmalig nötig: Repo-Settings -> Pages -> Source auf "GitHub Actions" stellen.
name: Build & Deploy (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nie zwei Deployments gleichzeitig
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: GitHub Pages aktivieren (falls noch nicht geschehen)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Statisch bauen
        run: npm run build
        env:
          # aktiviert site/base für den GitHub-Pages-Unterpfad (astro.config.mjs)
          GITHUB_PAGES: 'true'

      - name: Build-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
